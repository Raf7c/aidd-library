# library.yaml: catalog pointing to my domain repos.
#
# source = local path (/... or ~/...)  OR  GitHub url (private via SSH):

# Where to install: `default` = current project; `global` = all sessions.
default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

# Catalog. Filled in over time as domain repos are added.
library:
  skills:
    - name: grill-me
      description: Interviews you branch by branch on a plan before coding
      source: https://github.com/Raf7c/aidd-library-productivity/blob/main/skill/grill-me/SKILL.md
    - name: handoff
      description: Compacts the current session into a handoff doc
      source: https://github.com/Raf7c/aidd-library-productivity/blob/main/skill/handoff/SKILL.md
  agents: []
  prompts: []
